<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <form id="bookmark-form" class="container">
    <div class="heading-row">
      <h1 id="heading" class="popup-heading"></h1>
      <img id="favicon" class="favicon" alt="" />
    </div>
    <div class="field">
      <label for="title">Name</label>
      <input type="text" id="title" tabindex="1" spellcheck="false">
    </div>
    <div class="field field-tree">
      <div class="folder-header">
        <label>Folder <span id="filter-hint" class="filter-hint">type to filter</span></label>
        <button type="button" id="new-folder" class="btn-icon" tabindex="3" title="New Folder" aria-label="New Folder">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.5 4.5h4l2 2h7a1 1 0 011 1v7a1 1 0 01-1 1h-13a1 1 0 01-1-1v-9a1 1 0 011-1z"/><line x1="10" y1="9.5" x2="10" y2="14" /><line x1="7.5" y1="11.75" x2="12.5" y2="11.75" /></svg>
        </button>
      </div>
      <div id="filter-bar" class="filter-bar" style="display:none">
        <input type="text" id="filter-input" class="filter-input" placeholder="Filter folders...">
      </div>
      <div id="tree" class="tree"></div>
    </div>
    <div class="field">
      <label for="url">URL</label>
      <input type="text" id="url" tabindex="4" spellcheck="false">
    </div>
    <div class="actions">
      <button type="button" id="remove" class="btn btn-danger" tabindex="6" style="display:none">Remove</button>
      <div class="spacer"></div>
      <button type="submit" id="done" class="btn btn-primary" tabindex="5">Done</button>
    </div>
  </form>
  <div id="resize-handle-left" class="resize-handle resize-handle-left"></div>
  <div id="resize-handle-right" class="resize-handle resize-handle-right"></div>
  <script src="popup.js"></script>
</body>
</html>
