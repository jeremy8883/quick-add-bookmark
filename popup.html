<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <form id="bookmark-form" class="container">
    <div class="field">
      <label for="title">Name</label>
      <input type="text" id="title" spellcheck="false">
    </div>
    <div class="field">
      <label for="url">URL</label>
      <input type="text" id="url" spellcheck="false">
    </div>
    <div class="field">
      <div class="folder-header">
        <label>Folder <span id="filter-hint" class="filter-hint">type to filter</span></label>
        <button type="button" id="new-folder" class="btn-icon" title="New Folder">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="currentColor"><path d="M2 4.5A1.5 1.5 0 013.5 3h4.586a1 1 0 01.707.293L10.5 5H16.5A1.5 1.5 0 0118 6.5v9a1.5 1.5 0 01-1.5 1.5h-13A1.5 1.5 0 012 15.5v-11z"/><path d="M10 9a.5.5 0 01.5.5V11H12a.5.5 0 010 1h-1.5v1.5a.5.5 0 01-1 0V12H8a.5.5 0 010-1h1.5V9.5A.5.5 0 0110 9z" fill="#fff"/></svg>
        </button>
      </div>
      <div id="filter-bar" class="filter-bar" style="display:none">
        <input type="text" id="filter-input" class="filter-input" placeholder="Filter folders...">
      </div>
      <div id="tree" class="tree"></div>
    </div>
    <div class="actions">
      <button type="button" id="remove" class="btn btn-danger" style="display:none">Remove</button>
      <div class="spacer"></div>
      <button type="submit" id="done" class="btn btn-primary">Done</button>
    </div>
  </form>
  <script src="popup.js"></script>
</body>
</html>
