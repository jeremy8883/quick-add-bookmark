<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="icons/sync-bookmark-48.png" alt="" class="logo">
      <div class="header-text">
        <h1>Quick Sync Bookmark</h1>
        <p class="status" id="status">Not connected</p>
      </div>
    </header>
    <div class="actions">
      <button id="sync-now" class="btn btn-primary" hidden>Sync now</button>
      <p class="meta" id="last-synced" hidden></p>
      <p class="meta" id="sync-result" hidden></p>
      <button id="open-options" class="btn">Open settings</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
