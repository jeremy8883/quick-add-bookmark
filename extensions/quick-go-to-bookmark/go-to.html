<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="go-to.css">
</head>
<body>
  <div class="container">
    <div class="search-bar">
      <input type="text" id="search-input" class="search-input" placeholder="Search bookmarks..." spellcheck="false" autofocus>
    </div>
    <div id="results" class="results" role="listbox" aria-label="Bookmarks"></div>
    <div class="hint" id="hint">
      <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span><kbd>↵</kbd> open</span>
      <span><kbd>Ctrl</kbd>+<kbd>↵</kbd> new tab</span>
      <span><kbd>Esc</kbd> close</span>
    </div>
  </div>
  <script src="go-to.js"></script>
</body>
</html>
